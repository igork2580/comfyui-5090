[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true


[program:comfyui]
command=python /app/ComfyUI/main.py --listen 0.0.0.0 --port 8188 --preview-method auto
directory=/app/ComfyUI
autostart=true
autorestart=true
stdout_logfile=/var/log/comfyui.log
stderr_logfile=/var/log/comfyui.log
environment=PYTHONUNBUFFERED="1"
